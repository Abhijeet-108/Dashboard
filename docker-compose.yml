services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - SEED_ON_START=true

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - backend
